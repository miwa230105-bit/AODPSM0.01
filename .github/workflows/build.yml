name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npx pkg index.js --targets node18-win-x64 --output AlbionDPS.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Albion-DPS-Meter
          path: AlbionDPS.exe