name: Build and Release EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npx pkg index.js --targets node18-win-x64 --output AlbionDPS.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          name: Albion DPS Meter Build ${{ github.run_number }}
          files: AlbionDPS.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}